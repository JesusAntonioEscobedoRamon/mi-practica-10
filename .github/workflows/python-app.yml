name: Test and Build v3

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # Verificacion de codigo con ruff
      - name: Check code with ruff
        working-directory: src
        run: ruff check .
      
      # Ejecucion de pruebas con pytest
      - name: Test with pytest
        working-directory: src
        run: pytest tests.py
      
      # Autenticacion con GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Construcción y push de la imagen Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ✅ IMPORTANTE: Usando tus datos específicos
          tags: ghcr.io/jesusantonioescobedoramon/mi-practica-10:latest